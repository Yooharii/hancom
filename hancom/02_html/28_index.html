<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>
            시맨틱 구조
        </title>
    </head>
    <body>
        <header>
            <h1> 시맨틱 구조</h1>
            <nav> 홈 | 소개 | 연락처</nav> <!-- 메뉴 모음 -->
        </header>
        <main> <!-- 핵심 본문 -->
            <section>  <!-- 한 주제 덩어리 -->
                <article>첫 번째 글 내용</article> <!-- 완결된 글 하나 -->
            </section>
        </main>
        <aside>곁다리 정보(사이드바)</aside>  <!-- 본문 옆 보조 내용 -->
        <footer>ⓒ 2026 내 사이트</footer>       <!-- 맨 아래 꼬리말 -->
    </body>
</html>

<!-- div는 뜻 없는 빈 상자
시맨틱 태그는 이름만 봐도 무슨 구역인지 드러남
핵심 : header, nav, main, section, article, aside, footer 순서로 뼈대 구성 -->
