<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>시간표</title>
    </head>
    <body>
        <!-- table = 표 전체 상자, border="1"은 칸 선을 보이게 함 -->
        <table border="1">
            <tr>
                <th>요일</th>
                <th>과목</th>
                <th>시간</th>
            </tr>
            <!-- tr=가로 한 줄, th=제목 칸(굵게 가운데) -->
            <tr>
                <td>월</td>
                <td>국어</td>
                <td>7H</td>
            </tr>
            <tr>
                <td>화</td>
                <td>수학</td>
                <td>7H</td>
            </tr>
            <tr>
                <td>수</td>
                <td>영어</td>
                <td>7H</td>
            </tr>
        </table>
    </body>
</html>
