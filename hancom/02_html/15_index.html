<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>입력 폼</title>
    </head>
    <body>
          <!-- form = 입력칸들을 담는 묶음 상자 -->
           <form>
                <label>
                    이름: <input type ="text" placeholder="이름 입력">
                     <!-- label=설명 글자 / input=글자 칸 -->
                </label>
                <br>
                <label>
                    나이: <input type="number" placeholder = "HTML 능력 목표치 1 ~ 10">
                    <!-- input type=number → 숫자 칸 -->
                </label>
                <br>
                <label>
                    이메일: <input type ="text" placeholder = "이메일을 입력해주세요">
                </label>
                <br>
                <button type="submit">보내기</button>
                <!-- 누르는 버튼 -->
           </form>
    </body>
</html>
