<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>링크 넣기</title>    <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <!-- a = 누르면 다른 곳으로 가는 문(링크) -->
  <!-- href = 이동할 주소 (https:// 까지 적어야 동작) -->
  <a href="https://www.naver.com">네이버</a><br>
  <a href="http://www.google.com">구글</a><br>
  <a href="http://www.youtube.com">유튜브</a>
</body>
</html>
