<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>
            글자 꾸미기    
        </title>
    </head>
    <body>
        <h1>글자 꾸미기</h1>
        <p><em>기울임 강조</em></p> <!-- em : 글자가 비스듬히 기울어짐 -->
        <p><mark>형광펜</mark></p> <!-- mark : 노란 형광펜으로 칠한 느낌 -->
        <p><small>작게 쓰는 글씨</small></p>  <!-- small : 글자를 작게 -->
        <blockquote>남의 말을 인용합니다.</blockquote>
        <!-- blockquote : 남의 말을 인용하는 칸 -->
        <p>H<sub>2</sub></p> <!-- sub : 아래첨자 (작게 아래로) -->
        <p>H<sup>2</sup></p>  <!-- sup : 위첨자 (작게 위로) -->
    </body>
</html>
