<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>번호 목록</title>
    </head>
    <body>
        <!-- ol = 번호(1·2·3)가 자동으로 붙는 목록, 순서 중요할 때 -->
         <ol>
            <li>일어나기</li>
            <li>세수하기</li>
            <li>아침먹기</li>
            <ol type ="I">
                <li>배고픔</li>
                <li>졸림</li>
            </ol>
         </ol>
    </body>
</html>
