<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>
            접는 상자
        </title>
    </head>
    <body>
        <details>    <!-- 클릭하면 펴고 접히는 상자 -->
            <summary>정답 보기</summary>    <!-- 항상 보이는 제목(클릭 버튼) -->
            <p>여기 누르면 보입니다.</p>       <!-- 펼쳐야 보이는 내용 -->
            <a> 안녕하세요. </a>
        </details>
        <details>
            <summary> 날 눌러!</summary>
            <p> 다시 닫아! </p>
        </details>
    </body>
</html>
