<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>강조와 중첩</title>   <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <!-- 태그 안에 태그 넣기 = 중첩(nesting), strong은 글자를 굵게 강조 -->
  <p>
    지금 저의 상태는 <strong>매우</strong> 졸립니다.
  </p>   <!-- '매우'만 굵게 -->
</body>
</html>
<!-- <>&입력안될시
< -> &lt;
> -> &gt;
& -> &amp; -->
