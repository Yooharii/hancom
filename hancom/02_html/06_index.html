<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>제목과 문단</title>   <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <!-- 제목은 크기 6단계: h1이 제일 크고 숫자 커질수록 작아짐 -->
  <h1>제목 1</h1>
  <h2>제목 2</h2>
  <h3>제목 3</h3>
  <h4>제목 4</h4>
  <h5>제목 5</h5>
  <h6>제목 6</h6>
  <p>H태그는 제목 , p 태그는 문단입니다.</p>
</body>
</html>
