<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Class</title>
    </head>
    <body>
        <h1>Class</h1>
          <!-- class = 여러 요소가 함께 쓰는 이름표 (같은 값 여러 번 OK) -->
        <p class="note">안녕하세요. 오늘도 열심히 하겠습니다.</p>
        <p class="note">지금은 오전 11시 25분입니다.</p>
        <p class="note1">이제 곧 점심시간이네요.</p>
    </body>
</html>
