<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>줄•선</title>
    </head>
    <body>
        <p>첫째 줄<br>둘째 줄</p>
          <!-- br = 한 문단 안에서 줄 바꾸기 (닫는 태그 없는 빈 요소) -->
        <hr>
         <!-- hr = 내용을 나누는 가로 줄 (닫는 태그 없는 빈 요소) -->
    </body>
</html>
