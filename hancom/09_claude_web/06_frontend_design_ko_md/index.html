<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calculator — 사칙연산과 계산 기록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Vapor base palette (light-first) */
    --white: oklch(1 0 0);
    --gray-050: oklch(0.984 0 0);
    --gray-100: oklch(0.972 0 0);
    --gray-200: oklch(0.892 0 0);
    --gray-300: oklch(0.804 0 0);
    --gray-400: oklch(0.712 0 0);
    --gray-500: oklch(0.658 0 0);
    --gray-600: oklch(0.453 0 0);
    --gray-700: oklch(0.314 0 0);
    --gray-800: oklch(0.234 0 0);
    --gray-900: oklch(0.169 0 0);

    /* Cyan — this project's promoted primary accent */
    --cyan-050: oklch(0.978 0.013 215);
    --cyan-100: oklch(0.911 0.039 220);
    --cyan-200: oklch(0.812 0.078 224);
    --cyan-300: oklch(0.703 0.105 226);
    --cyan-400: oklch(0.633 0.110 230);
    --cyan-500: oklch(0.567 0.107 230);
    --cyan-600: oklch(0.475 0.099 232);
    --cyan-700: oklch(0.388 0.080 233);

    --red-100: oklch(0.881 0.057 18);
    --red-500: oklch(0.577 0.198 21);
    --red-600: oklch(0.488 0.181 22);

    /* Semantic alias (Vapor pattern) */
    --bg-canvas: var(--white);
    --bg-page: var(--gray-050);
    --fg-primary: var(--cyan-600);
    --fg-normal: var(--gray-900);
    --fg-secondary: var(--gray-800);
    --fg-hint: var(--gray-600);
    --border-secondary: var(--gray-200);
    --border-primary: var(--cyan-500);

    /* Elevation (Vapor: unified downward 20% black) */
    --shadow-sm: 0 1px 3px oklch(0 0 0 / .20);
    --shadow-md: 0 2px 10px oklch(0 0 0 / .20);
    --shadow-lg: 0 4px 16px oklch(0 0 0 / .20);

    /* Rounded */
    --r-key: 14px;
    --r-card: 16px;
    --r-300: 8px;

    /* Motion (Vapor: no drama) */
    --dur-fast: 120ms;
    --dur-normal: 180ms;
    --ease: cubic-bezier(.4, 0, .2, 1);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background: var(--bg-page);
    color: var(--fg-normal);
    font-family: "Pretendard", -apple-system, system-ui, sans-serif;
    letter-spacing: -0.1px;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .app{ width: 100%; max-width: 760px; }

  /* ---- Header: bilingual pairing ---- */
  header{ margin: 0 4px 24px; }
  .eyebrow{
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--fg-hint);
    margin: 0 0 6px;
  }
  h1{
    font-size: 32px; line-height: 40px; font-weight: 800;
    letter-spacing: -0.4px; margin: 0; color: var(--fg-normal);
  }
  .subtitle{
    font-size: 14px; line-height: 20px; font-weight: 500;
    color: var(--fg-hint); margin: 6px 0 0;
  }

  .layout{
    display: grid;
    grid-template-columns: minmax(0,1.15fr) minmax(0,1fr);
    gap: 20px;
    align-items: start;
  }

  .card{
    background: var(--bg-canvas);
    border: 1px solid var(--border-secondary);
    border-radius: var(--r-card);
  }

  /* ---- Readout ---- */
  .readout{
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border-secondary);
    text-align: right;
    overflow: hidden;
  }
  .expr{
    font-family: "Inter", sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 15px; line-height: 22px; font-weight: 500;
    color: var(--fg-hint);
    min-height: 22px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    direction: ltr;
  }
  .result{
    font-family: "Inter", sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 52px; line-height: 60px; font-weight: 700;
    letter-spacing: -1px;
    color: var(--fg-normal);
    margin-top: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .result.error{ color: var(--red-500); font-size: 40px; }
  .status{
    margin-top: 8px; min-height: 16px;
    font-size: 12px; line-height: 16px; color: var(--red-600);
    text-align: right;
  }

  /* ---- Keypad ---- */
  .keys{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 20px;
  }

  .key{
    position: relative;
    height: 62px;
    border: 1px solid var(--border-secondary);
    border-radius: var(--r-key);
    font-family: "Inter", sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 22px; font-weight: 600;
    color: var(--fg-secondary);
    cursor: pointer;
    overflow: hidden;
    /* the subtle glass: soft vertical fill + top edge light + gentle lift */
    background: linear-gradient(180deg, var(--white) 0%, var(--gray-050) 100%);
    box-shadow:
      var(--shadow-sm),
      inset 0 1px 0 oklch(1 0 0 / .9),
      inset 0 -1px 0 oklch(0 0 0 / .04);
    transition:
      background var(--dur-fast) var(--ease),
      box-shadow var(--dur-fast) var(--ease),
      color var(--dur-fast) var(--ease);
    -webkit-tap-highlight-color: transparent;
  }
  /* the gloss streak — the one flourish */
  .key::before{
    content: "";
    position: absolute;
    inset: 1px 1px auto 1px;
    height: 52%;
    border-radius: calc(var(--r-key) - 2px) calc(var(--r-key) - 2px) 40% 40%;
    background: linear-gradient(180deg, oklch(1 0 0 / .85) 0%, oklch(1 0 0 / 0) 100%);
    pointer-events: none;
    transition: opacity var(--dur-fast) var(--ease);
  }
  .key > span{ position: relative; z-index: 1; }

  .key:hover{
    background: linear-gradient(180deg, var(--gray-050) 0%, var(--gray-100) 100%);
  }
  .key:active{
    background: linear-gradient(180deg, var(--gray-100) 0%, var(--gray-200) 100%);
    box-shadow:
      inset 0 1px 3px oklch(0 0 0 / .10),
      inset 0 1px 0 oklch(1 0 0 / .5);
  }
  .key:active::before{ opacity: .4; }

  .key:focus-visible{
    outline: 2px solid var(--border-primary);
    outline-offset: 2px;
  }

  /* Function keys (AC ± %) — lighter glass */
  .key.fn{
    background: linear-gradient(180deg, var(--gray-100) 0%, var(--gray-200) 100%);
    color: var(--fg-secondary);
    font-size: 18px;
  }
  .key.fn:hover{ background: linear-gradient(180deg, var(--gray-200) 0%, var(--gray-300) 100%); }
  .key.fn.clear{ color: var(--red-600); }

  /* Operator keys — cyan glass */
  .key.op{
    background: linear-gradient(180deg, var(--cyan-400) 0%, var(--cyan-500) 100%);
    color: var(--white);
    border-color: var(--cyan-500);
    box-shadow:
      var(--shadow-sm),
      inset 0 1px 0 oklch(1 0 0 / .55),
      inset 0 -1px 0 oklch(0 0 0 / .10);
  }
  .key.op::before{
    background: linear-gradient(180deg, oklch(1 0 0 / .5) 0%, oklch(1 0 0 / 0) 100%);
  }
  .key.op:hover{ background: linear-gradient(180deg, var(--cyan-500) 0%, var(--cyan-600) 100%); }
  .key.op:active{
    background: linear-gradient(180deg, var(--cyan-600) 0%, var(--cyan-700) 100%);
    box-shadow: inset 0 1px 4px oklch(0 0 0 / .22), inset 0 1px 0 oklch(1 0 0 / .3);
  }
  .key.op.active-op{
    background: linear-gradient(180deg, var(--cyan-600) 0%, var(--cyan-700) 100%);
  }

  /* Equals — deepest cyan */
  .key.equals{
    background: linear-gradient(180deg, var(--cyan-500) 0%, var(--cyan-600) 100%);
    color: var(--white);
    border-color: var(--cyan-600);
  }
  .key.equals::before{ background: linear-gradient(180deg, oklch(1 0 0 / .45) 0%, oklch(1 0 0 / 0) 100%); }
  .key.equals:hover{ background: linear-gradient(180deg, var(--cyan-600) 0%, var(--cyan-700) 100%); }

  .key.zero{ grid-column: span 2; }

  /* ---- History ---- */
  .history{ display: flex; flex-direction: column; min-height: 0; }
  .history-head{
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border-secondary);
  }
  .history-head .titles h2{
    font-size: 16px; line-height: 24px; font-weight: 700; margin: 0;
    color: var(--fg-secondary);
  }
  .history-head .titles p{
    font-size: 12px; line-height: 18px; font-weight: 500;
    color: var(--fg-hint); margin: 2px 0 0;
  }
  .clear-history{
    appearance: none; border: 1px solid var(--border-secondary);
    background: var(--gray-100); color: var(--fg-secondary);
    font-family: inherit; font-size: 13px; font-weight: 500;
    height: 28px; padding: 0 12px; border-radius: var(--r-300);
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease);
  }
  .clear-history:hover{ background: var(--gray-200); }
  .clear-history:focus-visible{ outline: 2px solid var(--border-primary); outline-offset: 2px; }
  .clear-history:disabled{ opacity: .5; cursor: not-allowed; }

  .history-list{
    list-style: none; margin: 0; padding: 8px;
    overflow-y: auto; max-height: 396px;
  }
  .history-item{
    width: 100%;
    display: block; text-align: right;
    appearance: none; border: 0; background: transparent;
    font-family: "Inter", sans-serif; font-variant-numeric: tabular-nums;
    padding: 10px 12px; border-radius: var(--r-300);
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease);
  }
  .history-item:hover{ background: var(--gray-050); }
  .history-item:focus-visible{ outline: 2px solid var(--border-primary); outline-offset: -2px; }
  .history-item .h-expr{ display: block; font-size: 13px; color: var(--fg-hint); }
  .history-item .h-res{ display: block; font-size: 18px; font-weight: 700; color: var(--fg-normal); margin-top: 2px; }

  .history-empty{
    padding: 40px 20px; text-align: center;
    font-size: 13px; line-height: 20px; color: var(--fg-hint);
  }

  footer{
    margin: 24px 4px 0;
    font-size: 12px; color: var(--gray-500);
  }

  /* ---- Responsive ---- */
  @media (max-width: 680px){
    .layout{ grid-template-columns: 1fr; }
    .key{ height: 58px; }
    .history-list{ max-height: 240px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <p class="eyebrow">Calculator</p>
      <h1>사칙연산과 계산 기록을<br />한 화면에서</h1>
      <p class="subtitle">숫자와 연산자를 눌러 계산하고, 지난 계산은 오른쪽에서 다시 불러옵니다.</p>
    </header>

    <div class="layout">
      <!-- Calculator -->
      <section class="card" aria-label="계산기">
        <div class="readout">
          <div class="expr" id="expr" aria-hidden="true"></div>
          <output class="result" id="result" aria-live="polite">0</output>
          <div class="status" id="status" role="status"></div>
        </div>

        <div class="keys" id="keys">
          <button class="key fn clear" data-action="clear">AC</button>
          <button class="key fn" data-action="negate">±</button>
          <button class="key fn" data-action="percent">%</button>
          <button class="key op" data-action="op" data-op="÷"><span>÷</span></button>

          <button class="key" data-digit="7"><span>7</span></button>
          <button class="key" data-digit="8"><span>8</span></button>
          <button class="key" data-digit="9"><span>9</span></button>
          <button class="key op" data-action="op" data-op="×"><span>×</span></button>

          <button class="key" data-digit="4"><span>4</span></button>
          <button class="key" data-digit="5"><span>5</span></button>
          <button class="key" data-digit="6"><span>6</span></button>
          <button class="key op" data-action="op" data-op="−"><span>−</span></button>

          <button class="key" data-digit="1"><span>1</span></button>
          <button class="key" data-digit="2"><span>2</span></button>
          <button class="key" data-digit="3"><span>3</span></button>
          <button class="key op" data-action="op" data-op="+"><span>+</span></button>

          <button class="key zero" data-digit="0"><span>0</span></button>
          <button class="key" data-action="decimal"><span>.</span></button>
          <button class="key equals" data-action="equals"><span>=</span></button>
        </div>
      </section>

      <!-- History -->
      <aside class="card history" aria-label="계산 기록">
        <div class="history-head">
          <div class="titles">
            <h2>History</h2>
            <p>계산 기록</p>
          </div>
          <button class="clear-history" id="clearHistory" disabled>비우기</button>
        </div>
        <ul class="history-list" id="historyList">
          <li class="history-empty" id="historyEmpty">계산을 마치면 결과가 여기에 쌓입니다.</li>
        </ul>
      </aside>
    </div>

    <footer>Vapor UI 기반 · Cyan accent</footer>
  </div>

<script>
(function(){
  "use strict";

  var exprEl = document.getElementById("expr");
  var resultEl = document.getElementById("result");
  var statusEl = document.getElementById("status");
  var keysEl = document.getElementById("keys");
  var historyListEl = document.getElementById("historyList");
  var historyEmptyEl = document.getElementById("historyEmpty");
  var clearHistoryBtn = document.getElementById("clearHistory");

  var current = "0";     // string shown
  var previous = null;   // number
  var operator = null;   // "+","−","×","÷"
  var overwrite = true;  // next digit replaces display
  var errored = false;
  var history = [];

  function fmt(str){
    if(str === "오류") return str;
    var neg = str.charAt(0) === "-";
    if(neg) str = str.slice(1);
    var parts = str.split(".");
    var intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    var out = parts.length > 1 ? intPart + "." + parts[1] : intPart;
    return (neg ? "-" : "") + out;
  }

  function fmtNum(n){
    if(!isFinite(n)) return "오류";
    // trim floating error, keep up to 10 significant-ish digits
    var r = Math.round((n + Number.EPSILON) * 1e10) / 1e10;
    var s = String(r);
    return s;
  }

  function render(){
    resultEl.textContent = fmt(current);
    resultEl.classList.toggle("error", errored);
    if(operator !== null && previous !== null){
      exprEl.textContent = fmt(fmtNum(previous)) + " " + operator + (overwrite ? "" : " " + fmt(current));
    } else {
      exprEl.textContent = "";
    }
    // active operator highlight
    var ops = keysEl.querySelectorAll(".key.op");
    ops.forEach(function(b){
      b.classList.toggle("active-op", operator !== null && overwrite && b.getAttribute("data-op") === operator);
    });
  }

  function setStatus(msg){ statusEl.textContent = msg || ""; }

  function clearAll(){
    current = "0"; previous = null; operator = null; overwrite = true; errored = false;
    setStatus(""); render();
  }

  function inputDigit(d){
    if(errored){ clearAll(); }
    if(overwrite){ current = d; overwrite = false; }
    else {
      if(current.replace("-","").replace(".","").length >= 12) return; // guard length
      current = current === "0" ? d : current + d;
    }
    render();
  }

  function inputDecimal(){
    if(errored){ clearAll(); }
    if(overwrite){ current = "0."; overwrite = false; render(); return; }
    if(current.indexOf(".") === -1){ current += "."; render(); }
  }

  function negate(){
    if(errored) return;
    if(current === "0") return;
    current = current.charAt(0) === "-" ? current.slice(1) : "-" + current;
    render();
  }

  function percent(){
    if(errored) return;
    var v = parseFloat(current) / 100;
    current = fmtNum(v); overwrite = true; render();
  }

  function compute(a, op, b){
    switch(op){
      case "+": return a + b;
      case "−": return a - b;
      case "×": return a * b;
      case "÷":
        if(b === 0) return Infinity;
        return a / b;
    }
    return b;
  }

  function chooseOperator(op){
    if(errored) return;
    if(operator !== null && !overwrite){
      // evaluate pending
      var res = compute(previous, operator, parseFloat(current));
      if(!isFinite(res)){ showError("0으로 나눌 수 없습니다"); return; }
      previous = res;
      current = fmtNum(res);
    } else if(previous === null){
      previous = parseFloat(current);
    }
    operator = op;
    overwrite = true;
    render();
  }

  function equals(){
    if(errored || operator === null || previous === null) return;
    var b = parseFloat(current);
    var res = compute(previous, operator, b);
    if(!isFinite(res)){ showError("0으로 나눌 수 없습니다"); return; }
    var exprText = fmtNum(previous) + " " + operator + " " + b;
    var resText = fmtNum(res);
    addHistory(exprText, resText);
    current = resText;
    previous = null; operator = null; overwrite = true;
    setStatus("");
    // show completed expression on top line briefly
    exprEl.textContent = fmt(exprText) + " =";
    resultEl.textContent = fmt(current);
    var ops = keysEl.querySelectorAll(".key.op");
    ops.forEach(function(b){ b.classList.remove("active-op"); });
  }

  function showError(msg){
    current = "오류"; errored = true; previous = null; operator = null; overwrite = true;
    setStatus(msg);
    render();
  }

  function addHistory(exprText, resText){
    history.unshift({ expr: exprText, res: resText });
    if(history.length > 50) history.pop();
    renderHistory();
  }

  function renderHistory(){
    historyListEl.innerHTML = "";
    if(history.length === 0){
      var li = document.createElement("li");
      li.className = "history-empty";
      li.textContent = "계산을 마치면 결과가 여기에 쌓입니다.";
      historyListEl.appendChild(li);
      clearHistoryBtn.disabled = true;
      return;
    }
    clearHistoryBtn.disabled = false;
    history.forEach(function(item){
      var li = document.createElement("li");
      var btn = document.createElement("button");
      btn.className = "history-item";
      btn.innerHTML = '<span class="h-expr">' + fmt(item.expr).replace(/([+−×÷=])/g, " $1 ").replace(/\s+/g," ").trim() + '</span><span class="h-res">' + fmt(item.res) + '</span>';
      btn.setAttribute("aria-label", "결과 " + item.res + " 불러오기");
      btn.addEventListener("click", function(){
        current = item.res; overwrite = true; errored = false;
        previous = null; operator = null; setStatus("");
        render();
      });
      li.appendChild(btn);
      historyListEl.appendChild(li);
    });
  }

  clearHistoryBtn.addEventListener("click", function(){
    history = [];
    renderHistory();
  });

  // ---- Click handling ----
  keysEl.addEventListener("click", function(e){
    var btn = e.target.closest("button.key");
    if(!btn) return;
    if(btn.dataset.digit !== undefined){ inputDigit(btn.dataset.digit); return; }
    switch(btn.dataset.action){
      case "clear": clearAll(); break;
      case "negate": negate(); break;
      case "percent": percent(); break;
      case "decimal": inputDecimal(); break;
      case "op": chooseOperator(btn.dataset.op); break;
      case "equals": equals(); break;
    }
  });

  // ---- Physical keyboard ----
  var keyMap = { "*": "×", "/": "÷", "-": "−", "+": "+" };
  window.addEventListener("keydown", function(e){
    if(e.key >= "0" && e.key <= "9"){ inputDigit(e.key); flash("[data-digit='" + e.key + "']"); return; }
    if(e.key === "."){ inputDecimal(); flash("[data-action='decimal']"); return; }
    if(e.key === "+" || e.key === "-" || e.key === "*" || e.key === "/"){
      var op = keyMap[e.key]; chooseOperator(op);
      flash(".key.op[data-op='" + op + "']"); e.preventDefault(); return;
    }
    if(e.key === "Enter" || e.key === "="){ equals(); flash("[data-action='equals']"); e.preventDefault(); return; }
    if(e.key === "Escape"){ clearAll(); flash("[data-action='clear']"); return; }
    if(e.key === "Backspace"){ backspace(); return; }
    if(e.key === "%"){ percent(); flash("[data-action='percent']"); return; }
  });

  function backspace(){
    if(errored){ clearAll(); return; }
    if(overwrite) return;
    if(current.length <= 1 || (current.length === 2 && current.charAt(0) === "-")){
      current = "0"; overwrite = true;
    } else {
      current = current.slice(0, -1);
    }
    render();
  }

  function flash(sel){
    var el = keysEl.querySelector(sel);
    if(!el) return;
    el.classList.add("kb-active");
    el.style.filter = "brightness(0.96)";
    setTimeout(function(){ el.style.filter = ""; }, 90);
  }

  render();
})();
</script>
</body>
</html>
