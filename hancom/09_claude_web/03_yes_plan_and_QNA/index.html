<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator" role="application" aria-label="계산기">
    <section class="display">
      <button class="copy-btn" id="copyBtn" type="button" title="결과 복사" aria-label="결과 복사">복사</button>
      <div class="expression" id="expression" aria-live="polite"></div>
      <div class="result" id="result" aria-live="polite">0</div>
    </section>

    <section class="buttons" id="buttons">
      <button class="btn func" data-action="clear">AC</button>
      <button class="btn func" data-action="negate">±</button>
      <button class="btn func" data-action="percent">%</button>
      <button class="btn op" data-action="operator" data-value="÷">÷</button>

      <button class="btn num" data-action="number" data-value="7">7</button>
      <button class="btn num" data-action="number" data-value="8">8</button>
      <button class="btn num" data-action="number" data-value="9">9</button>
      <button class="btn op" data-action="operator" data-value="×">×</button>

      <button class="btn num" data-action="number" data-value="4">4</button>
      <button class="btn num" data-action="number" data-value="5">5</button>
      <button class="btn num" data-action="number" data-value="6">6</button>
      <button class="btn op" data-action="operator" data-value="−">−</button>

      <button class="btn num" data-action="number" data-value="1">1</button>
      <button class="btn num" data-action="number" data-value="2">2</button>
      <button class="btn num" data-action="number" data-value="3">3</button>
      <button class="btn op" data-action="operator" data-value="+">+</button>

      <button class="btn num zero" data-action="number" data-value="0">0</button>
      <button class="btn num" data-action="decimal" data-value=".">.</button>
      <button class="btn op equals" data-action="equals">=</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
