<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>말랑 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <header class="intro">
      <h1 class="intro__title">말랑 계산기</h1>
      <p class="intro__lede">숫자를 누르거나 키보드로 바로 입력하세요.</p>
    </header>

    <div class="workspace">
      <!-- 계산기 슬래브 -->
      <section class="calc" aria-label="계산기">
        <div class="display">
          <div class="display__expr" id="expr" aria-hidden="true">&nbsp;</div>
          <output class="display__result" id="result" aria-live="polite">0</output>
        </div>

        <div class="keypad">
          <button class="key key--fn" data-action="clear" type="button">C</button>
          <button class="key key--fn" data-action="negate" type="button" aria-label="부호 바꾸기">±</button>
          <button class="key key--fn" data-action="percent" type="button" aria-label="퍼센트">%</button>
          <button class="key key--op" data-op="/" type="button" aria-label="나누기">÷</button>

          <button class="key" data-num="7" type="button">7</button>
          <button class="key" data-num="8" type="button">8</button>
          <button class="key" data-num="9" type="button">9</button>
          <button class="key key--op" data-op="*" type="button" aria-label="곱하기">×</button>

          <button class="key" data-num="4" type="button">4</button>
          <button class="key" data-num="5" type="button">5</button>
          <button class="key" data-num="6" type="button">6</button>
          <button class="key key--op" data-op="-" type="button" aria-label="빼기">−</button>

          <button class="key" data-num="1" type="button">1</button>
          <button class="key" data-num="2" type="button">2</button>
          <button class="key" data-num="3" type="button">3</button>
          <button class="key key--op" data-op="+" type="button" aria-label="더하기">+</button>

          <button class="key key--zero" data-num="0" type="button">0</button>
          <button class="key" data-action="decimal" type="button" aria-label="소수점">.</button>
          <button class="key key--eq" data-action="equals" type="button" aria-label="계산">=</button>
        </div>
      </section>

      <!-- 히스토리 -->
      <section class="history" aria-label="계산 기록">
        <button class="history__toggle" id="historyToggle" type="button" aria-expanded="true" aria-controls="historyList">
          <span>기록</span>
          <span class="history__chevron" aria-hidden="true">▾</span>
        </button>
        <ul class="history__list" id="historyList">
          <li class="history__empty" id="historyEmpty">아직 계산 기록이 없어요. 계산을 시작해 보세요.</li>
        </ul>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
