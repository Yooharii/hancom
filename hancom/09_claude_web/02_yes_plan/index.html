<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calculator">
    <div class="display">
      <div class="display-history" id="history"></div>
      <div class="display-current" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="btn btn-func" data-action="clear">AC</button>
      <button class="btn btn-func" data-action="negate">+/−</button>
      <button class="btn btn-func" data-action="percent">%</button>
      <button class="btn btn-op" data-action="operator" data-op="/">÷</button>

      <button class="btn btn-num" data-num="7">7</button>
      <button class="btn btn-num" data-num="8">8</button>
      <button class="btn btn-num" data-num="9">9</button>
      <button class="btn btn-op" data-action="operator" data-op="*">×</button>

      <button class="btn btn-num" data-num="4">4</button>
      <button class="btn btn-num" data-num="5">5</button>
      <button class="btn btn-num" data-num="6">6</button>
      <button class="btn btn-op" data-action="operator" data-op="-">−</button>

      <button class="btn btn-num" data-num="1">1</button>
      <button class="btn btn-num" data-num="2">2</button>
      <button class="btn btn-num" data-num="3">3</button>
      <button class="btn btn-op" data-action="operator" data-op="+">+</button>

      <button class="btn btn-num btn-zero" data-num="0">0</button>
      <button class="btn btn-num" data-action="decimal">.</button>
      <button class="btn btn-eq" data-action="equals">=</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
