<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/main.css"> <!-- ① 외부 -->
    <style>
        p{color:green;} /* ② 내부 */
    </style>
    <title>CSS 붙이는 3가지 방법</title>
</head>
<body>
    <h1>3가지 방법</h1>
    <p>내부 스타일로 초록</p>
    <p style="color:red">인라인으로 빨강</p>  <!-- ③ 인라인 -->
</body>
</html>
